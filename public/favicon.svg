<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="256" cy="256" r="220" fill="#030416" opacity="0.9"/>
  
  <!-- AM Letters - Centered -->
  <text x="256" y="340" 
        font-family="Arial, sans-serif" 
        font-size="200" 
        font-weight="bold" 
        fill="url(#grad1)" 
        text-anchor="middle"
        stroke="#3b82f6" 
        stroke-width="3">AM</text>
  
  <!-- Decorative code brackets -->
  <text x="80" y="140" font-size="50" fill="#3b82f6" opacity="0.3" font-family="monospace" font-weight="bold">&lt;</text>
  <text x="420" y="400" font-size="50" fill="#8b5cf6" opacity="0.3" font-family="monospace" font-weight="bold">/&gt;</text>
</svg>
